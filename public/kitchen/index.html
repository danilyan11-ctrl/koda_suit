<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SELFMADE YB // Y.C.L KITCHEN</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --red: #e60000;
            --white: #f4f4f4;
            --grey: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg); color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .noise {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="n"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23n)" opacity="0.05"/%3E%3C/svg%3E');
            pointer-events: none; z-index: 999;
        }

        #boot-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; transition: opacity 0.5s ease;
        }

        .hold-btn {
            width: 150px; height: 150px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center;
            position: relative; cursor: pointer;
            transition: transform 0.3s ease, background 0.3s ease;
        }
        
        .hold-text {
            font-weight: 700; font-size: 0.8rem; letter-spacing: 2px;
            text-align: center; color: rgba(255,255,255,0.5);
            transition: color 0.3s ease;
        }

        .progress-ring { position: absolute; top: -1px; left: -1px; pointer-events: none; transform: rotate(-90deg); }
        .progress-ring__circle {
            transition: stroke-dashoffset 0.1s linear;
            stroke: var(--white); stroke-width: 2; fill: transparent;
            stroke-dasharray: 483; stroke-dashoffset: 483; 
        }

        #boot-screen.active .hold-btn { transform: scale(0.95); background: rgba(255,255,255,0.02); }
        #boot-screen.active .hold-text { color: var(--white); }
        
        .instruction { position: absolute; bottom: 40px; font-size: 0.7rem; color: #555; letter-spacing: 4px; text-transform: uppercase; }

        #experience-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; z-index: 40;
        }

        #audio-aura {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 250px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 70%);
            filter: blur(20px);
        }

        #dynamic-logo {
            width: 110px; position: relative; z-index: 2;
            filter: brightness(0) invert(1);
        }

        @keyframes smoothBreathe {
            0% { transform: scale(1); opacity: 0.8; filter: brightness(0) invert(1) drop-shadow(0 0 0px rgba(255,255,255,0)); }
            100% { transform: scale(1.05); opacity: 1; filter: brightness(0) invert(1) drop-shadow(0 0 15px rgba(255,255,255,0.15)); }
        }
        
        .is-playing #dynamic-logo { animation: smoothBreathe 1.5s infinite alternate ease-in-out; }

        .track-info { position: absolute; bottom: 10%; width: 80%; max-width: 300px; text-align: center; z-index: 2; }
        .artist { font-size: 1rem; font-weight: 300; letter-spacing: 8px; margin-bottom: 5px; color: #888; }
        .album { font-size: 3rem; font-weight: 900; letter-spacing: -2px; text-transform: uppercase; line-height: 1; color: var(--white); }
        
        /* ПОЛОСА ЗАГРУЗКИ */
        .progress-container {
            width: 100%; height: 2px; background: rgba(255,255,255,0.1);
            margin-top: 25px; border-radius: 2px; overflow: hidden; position: relative;
        }
        .progress-bar {
            height: 100%; width: 0%; background: var(--red);
            transition: width 0.1s linear;
        }
        
        .timer { font-family: monospace; font-size: 0.85rem; color: var(--red); margin-top: 10px; letter-spacing: 2px; }

        #date-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; z-index: 90;
        }

        #date-screen.visible { opacity: 1; animation: flashIn 0.1s ease-out forwards; }
        
        .massive-date { 
            font-size: 3.5rem; font-weight: 900; color: var(--white); 
            letter-spacing: 4px; text-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        .date-sub { font-size: 0.8rem; letter-spacing: 8px; color: #555; margin-top: 10px; text-transform: uppercase; }

        #crash-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; z-index: 100;
            padding: 20px; text-align: center;
        }

        #crash-screen.visible { opacity: 1; pointer-events: all; animation: slowFadeIn 1s ease forwards; }

        .final-logo { width: 40px; margin-bottom: 30px; filter: brightness(0) invert(1); opacity: 0.3; }
        .access-denied { font-size: 2.5rem; font-weight: 900; color: var(--white); line-height: 1; margin-bottom: 8px; text-transform: uppercase; letter-spacing: -1px; }
        .crash-sub { font-size: 0.8rem; color: #666; letter-spacing: 4px; margin-bottom: 50px; text-transform: uppercase; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }

        .premium-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--white);
            padding: 16px 20px;
            font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
        }
        
        .premium-btn:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.08); }
        
        .premium-btn.accent { background: var(--white); color: var(--bg); border: none; font-weight: 900; }
        .premium-btn.accent:active { background: #ddd; }

        .glitch-effect { filter: url(#displacementFilter); }

        @keyframes slowFadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes flashIn { 0% { background: var(--white); filter: invert(1); } 100% { background: var(--bg); filter: invert(0); } }
    </style>
</head>
<body>

    <div class="noise"></div>

    <svg style="display: none;">
        <defs>
            <filter id="displacementFilter">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="30" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>

    <div id="boot-screen">
        <div class="hold-btn" id="hold-trigger">
            <svg class="progress-ring" width="150" height="150">
                <circle class="progress-ring__circle" cx="75" cy="75" r="74" />
            </svg>
            <span class="hold-text">HOLD</span>
        </div>
        <div class="instruction">SYSTEM LOCKED</div>
    </div>

    <div id="experience-screen">
        <div id="audio-aura"></div>
        <img src="./logo.png" alt="KODA" id="dynamic-logo">
        <div class="track-info">
            <div class="artist">SELFMADE YB</div>
            <div class="album">Y.C.L<br>KITCHEN</div>
            
            <div class="progress-container">
                <div class="progress-bar" id="audio-progress"></div>
            </div>
            
            <div class="timer" id="time-display">00.00 / 15.00</div>
        </div>
    </div>

    <div id="date-screen">
        <div class="massive-date">24.04.2026</div>
        <div class="date-sub">ALBUM RELEASE</div>
    </div>

    <div id="crash-screen">
        <img src="./logo.png" alt="KODA" class="final-logo">
        <div class="access-denied">Y.C.L KITCHEN</div>
        <div class="crash-sub">СНИППЕТ ЗАВЕРШЕН</div>
        
                <div class="btn-group">
            <a href="https://t.me/thekodamusic?text=%D0%A1%D0%B0%D0%BB%D1%8E%D1%82%2C%20%D1%85%D0%BE%D1%87%D1%83%20%D0%BC%D0%B5%D1%80%D1%87%20KITCHEN" class="premium-btn accent">ЗАКАЗАТЬ МЕРЧ</a>
            <a id="calendar-link" class="premium-btn" download="ycl_kitchen.ics">НАПОМНИТЬ В КАЛЕНДАРЬ</a>
        </div>
    </div>

   <audio id="audio-track" src="./freakmaster.mp3" preload="auto" playsinline></audio>

    <script>
        const bootScreen = document.getElementById('boot-screen');
        const holdTrigger = document.getElementById('hold-trigger');
        const circle = document.querySelector('.progress-ring__circle');
        const experienceScreen = document.getElementById('experience-screen');
        const dateScreen = document.getElementById('date-screen');
        const crashScreen = document.getElementById('crash-screen');
        const audio = document.getElementById('audio-track');
        const timeDisplay = document.getElementById('time-display');
        const progressBar = document.getElementById('audio-progress');

        let audioUnlocked = false;

        let holdTimer;
        let progress = 0;
        const maxProgress = 465; 
        const holdDuration = 1500; 
        const intervalTime = 20;
        const step = maxProgress / (holdDuration / intervalTime);

        circle.style.strokeDasharray = maxProgress;
        circle.style.strokeDashoffset = maxProgress;

        function startHold(e) {
            e.preventDefault();
            
            if (!audioUnlocked) {
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                    audioUnlocked = true;
                }).catch(err => console.log(err));
            }

            bootScreen.classList.add('active');
            holdTimer = setInterval(() => {
                progress += step;
                const offset = maxProgress - progress;
                circle.style.strokeDashoffset = offset < 0 ? 0 : offset;
                if (progress >= maxProgress) {
                    clearInterval(holdTimer);
                    unlockExperience();
                }
            }, intervalTime);
        }

        function stopHold(e) {
            e.preventDefault();
            clearInterval(holdTimer);
            bootScreen.classList.remove('active');
            progress = 0;
            circle.style.strokeDashoffset = maxProgress;
        }

        holdTrigger.addEventListener('mousedown', startHold);
        holdTrigger.addEventListener('touchstart', startHold, {passive: false});
        window.addEventListener('mouseup', stopHold);
        window.addEventListener('touchend', stopHold);

        function unlockExperience() {
            holdTrigger.removeEventListener('mousedown', startHold);
            holdTrigger.removeEventListener('touchstart', startHold);
            
            bootScreen.style.opacity = '0';
            setTimeout(() => {
                bootScreen.style.display = 'none';
                experienceScreen.style.opacity = '1';
                experienceScreen.classList.add('is-playing');
                audio.play();
            }, 500);
        }

        audio.addEventListener('timeupdate', () => {
            let current = audio.currentTime;
            let sec = Math.floor(current);
            let ms = Math.floor((current % 1) * 100);
            timeDisplay.innerText = `00:${sec < 10 ? '0'+sec : sec}.${ms < 10 ? '0'+ms : ms} / 00:15.00`;

            // Заполняем полоску загрузки
            progressBar.style.width = (current / 15) * 100 + '%';

            if (current >= 15) {
                audio.pause();
                audio.currentTime = 15;
                progressBar.style.width = '100%';
                experienceScreen.classList.remove('is-playing');
                triggerSequence();
            }
        });

        function triggerSequence() {
            experienceScreen.classList.add('glitch-effect');
            setTimeout(() => {
                experienceScreen.style.display = 'none';
                dateScreen.classList.add('visible');
                setTimeout(() => {
                    dateScreen.style.display = 'none';
                    crashScreen.classList.add('visible');
                }, 2000);
            }, 200);
        }

        // Подготовка ссылки для скачивания календаря (фикс для Safari)
        const icsContent = `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Koda Music//Y.C.L KITCHEN//RU\nBEGIN:VEVENT\nDTSTART:20260424T000000Z\nDTEND:20260425T000000Z\nSUMMARY:Релиз альбома SELFMADE YB - Y.C.L KITCHEN\nDESCRIPTION:Альбом Y.C.L KITCHEN уже доступен на всех площадках. Слушай прямо сейчас!\nBEGIN:VALARM\nTRIGGER:-PT9H\nACTION:DISPLAY\nDESCRIPTION:Релиз альбома Y.C.L KITCHEN сегодня!\nEND:VALARM\nEND:VEVENT\nEND:VCALENDAR`;
        
        const calendarLink = document.getElementById('calendar-link');
        calendarLink.href = 'data:text/calendar;charset=utf8,' + encodeURIComponent(icsContent);

        calendarLink.addEventListener('click', function() {
            const originalText = this.innerText;
            this.innerText = "ОТКРЫВАЕМ КАЛЕНДАРЬ...";
            setTimeout(() => {
                this.innerText = originalText;
            }, 3000);
        });
    </script>
</body>
</html>
